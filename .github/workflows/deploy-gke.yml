name: Build and Deploy to GKE

# Trigger the workflow on pushes to the main branch
on:
  push:
    branches:
      - main

env:
  # ⚠️ Update these values to match your specific GCP project and GKE cluster setup
  PROJECT_ID: your-google-cloud-project-id
  GAR_LOCATION: us-central1
  GKE_CLUSTER: ai-compliance-cluster
  GKE_ZONE: us-central1
  REPOSITORY: ai-compliance-repo
  BACKEND_IMAGE: backend
  FRONTEND_IMAGE: frontend

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. Authenticate to Google Cloud
    # Ensure you've created a GitHub Secret named GCP_CREDENTIALS containing your service account JSON key
    # (Alternatively, replace this with Workload Identity Federation for keyless auth)
    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    # 2. Configure Docker to push to Google Artifact Registry
    - name: Docker Auth
      run: |-
        gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

    # 3. Get Credentials to interact with GKE using kubectl
    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }}

    # 4. Build the Docker images exactly as we do in Cloud Build
    - name: Build Backend Image
      run: |-
        docker build \
          --tag "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}" \
          ./backend

    - name: Build Frontend Image
      run: |-
        docker build \
          --tag "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}" \
          ./frontend

    # 5. Push the built Docker images to Google Artifact Registry
    - name: Publish Backend Image
      run: |-
        docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}"

    - name: Publish Frontend Image
      run: |-
        docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"

    # 6. Dynamically update the Kubernetes yaml manifests to target the newly built and pushed exact Git SHAs
    - name: Update Kubernetes manifests
      run: |-
        sed -i "s|image: backend:latest|image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}|g" k8s/02-backend.yaml
        sed -i "s|image: frontend:latest|image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|g" k8s/03-frontend.yaml

    # 7. Apply the infrastructure seamlessly to Google Kubernetes Engine
    - name: Deploy Resources to GKE
      run: |-
        kubectl apply -f k8s/00-namespace.yaml
        kubectl apply -f k8s/01-postgres.yaml
        kubectl apply -f k8s/
