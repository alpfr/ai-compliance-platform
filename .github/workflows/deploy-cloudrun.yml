name: Build and Deploy to Cloud Run Serverless

on:
  push:
    branches:
      - main

env:
  # ⚠️ Update these values to match your specific GCP project
  PROJECT_ID: your-google-cloud-project-id
  GAR_LOCATION: us-central1
  REPOSITORY: ai-compliance-repo
  BACKEND_SERVICE: ai-compliance-backend
  FRONTEND_SERVICE: ai-compliance-frontend
  REGION: us-central1

jobs:
  deploy-to-cloud-run:
    name: Setup, Build, Publish, and Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. Authenticate to Google Cloud
    # Ensure you've created a GitHub Secret named GCP_CREDENTIALS containing your service account JSON key
    # Requires roles: Cloud Run Admin, Artifact Registry Writer, Service Account User
    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    # 2. Configure Docker to push to Google Artifact Registry
    - name: Docker Auth
      run: |-
        gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

    # 3. Build the Backend Image
    - name: Build Backend Image
      run: |-
        docker build \
          --tag "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}" \
          ./backend

    # 4. Push the Backend Image to Google Artifact Registry
    - name: Publish Backend Image
      run: |-
        docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}"

    # 5. Deploy Backend to Cloud Run
    # This step is performed before the frontend build so we can extract its live URL
    - id: 'deploy-backend'
      name: 'Deploy Backend to Cloud Run'
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: '${{ env.BACKEND_SERVICE }}'
        region: '${{ env.REGION }}'
        image: '${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}'
        env_vars: |-
          # Securely inject secrets stored in GitHub Actions directly into the backend!
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
        flags: '--allow-unauthenticated'

    # 6. Build the Frontend Image (injecting the newly generated Backend URL natively!)
    - name: Build Frontend Image
      run: |-
        # We pass VITE_API_URL as a build-arg containing the exact live URL of the fast backend 
        docker build \
          --build-arg VITE_API_URL=${{ steps.deploy-backend.outputs.url }} \
          --tag "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}" \
          ./frontend

    # 7. Push the Frontend Image to Google Artifact Registry
    - name: Publish Frontend Image
      run: |-
        docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}"

    # 8. Deploy Frontend to Cloud Run
    - id: 'deploy-frontend'
      name: 'Deploy Frontend to Cloud Run'
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: '${{ env.FRONTEND_SERVICE }}'
        region: '${{ env.REGION }}'
        image: '${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}'
        flags: '--allow-unauthenticated'

    # 9. Output Live URLs
    - name: 'Show Deployment Output'
      run: |-
        echo "✅ API Backend is live at: ${{ steps.deploy-backend.outputs.url }}"
        echo "✅ React Dashboard is live at: ${{ steps.deploy-frontend.outputs.url }}"
