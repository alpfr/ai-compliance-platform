---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-compliance
  labels:
    app: ai-compliance
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-compliance
      component: frontend
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ai-compliance
        component: frontend
    spec:
      # Schedule on Spot (preemptible) nodes for cost savings
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      terminationGracePeriodSeconds: 25
      containers:
        - name: frontend
          # In a real environment, replace 'local' with your Artifact Registry (e.g., us-central1-docker.pkg.dev/project_id/repo/frontend:latest)
          image: frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: ai-compliance
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ai-compliance
      component: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: ai-compliance
spec:
  type: NodePort
  selector:
    app: ai-compliance
    component: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
