apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-compliance-ingress
  namespace: ai-compliance
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # GKE specific annotations (modify if using standard gce ingress instead of nginx)
    # kubernetes.io/ingress.global-static-ip-name: "ai-compliance-ip"
spec:
  rules:
    - http:
        paths:
          # Backend API Routes
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /organizations
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /assessments
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /guardrails
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /compliance
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /audit-trail
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
                  
          # Frontend Routes (Catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 3000
