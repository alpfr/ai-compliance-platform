---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: ai-compliance
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ai-compliance
  labels:
    app: ai-compliance
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-compliance
      component: database
  template:
    metadata:
      labels:
        app: ai-compliance
        component: database
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "ai-compliance-secure-db-pass"
            - name: POSTGRES_DB
              value: "ai_compliance"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: ai-compliance
spec:
  selector:
    app: ai-compliance
    component: database
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
