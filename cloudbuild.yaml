steps:
  # Step 1: Build the optimized Gunicorn Backend container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-compliance-repo/backend:$BUILD_ID', './backend']
  
  # Step 2: Build the optimized Vite/NGINX Frontend container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-compliance-repo/frontend:$BUILD_ID', './frontend']

  # Step 3: Push Backend container to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-compliance-repo/backend:$BUILD_ID']

  # Step 4: Push Frontend container to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-compliance-repo/frontend:$BUILD_ID']

  # Step 5: Dynamically substitute the latest Git SHA images into the k8s descriptors
  - name: 'ubuntu'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        sed -i "s|backend:latest|us-central1-docker.pkg.dev/$PROJECT_ID/ai-compliance-repo/backend:$BUILD_ID|g" k8s/02-backend.yaml
        sed -i "s|frontend:latest|us-central1-docker.pkg.dev/$PROJECT_ID/ai-compliance-repo/frontend:$BUILD_ID|g" k8s/03-frontend.yaml

  # Step 6: Create the core Kubernetes Namespace if it does not exist
  - name: 'gcr.io/cloud-builders/kubectl'
    args: ['apply', '-f', 'k8s/00-namespace.yaml']
    env:
      - 'CLOUDSDK_COMPUTE_REGION=$_CLUSTER_REGION'
      - 'CLOUDSDK_CONTAINER_CLUSTER=$_CLUSTER_NAME'

  # Step 7: Apply the PostgreSQL persistent Database infrastructure
  - name: 'gcr.io/cloud-builders/kubectl'
    args: ['apply', '-f', 'k8s/01-postgres.yaml']
    env:
      - 'CLOUDSDK_COMPUTE_REGION=$_CLUSTER_REGION'
      - 'CLOUDSDK_CONTAINER_CLUSTER=$_CLUSTER_NAME'

  # Step 8: Apply all remaining infrastructure (Deployments, Services, and path-routing Ingress configurations)
  - name: 'gcr.io/cloud-builders/kubectl'
    args: ['apply', '-f', 'k8s/']
    env:
      - 'CLOUDSDK_COMPUTE_REGION=$_CLUSTER_REGION'
      - 'CLOUDSDK_CONTAINER_CLUSTER=$_CLUSTER_NAME'

substitutions:
  # Update these default substitution values before applying if needed, or pass them dynamically on trigger configurations!
  _CLUSTER_NAME: 'opssightai-cluster'
  _CLUSTER_REGION: 'us-central1-a'

options:
  logging: CLOUD_LOGGING_ONLY
